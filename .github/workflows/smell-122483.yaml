# 122483 Eduardo Fragoso
name: "Code Smell Detection - Large Class (IGE-122483)"

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  large-class-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Qodana Scan - Large Class Detection
        uses: JetBrains/qodana-action@v2025.3
        with:
          args: --config,qodana-smell.yaml
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
