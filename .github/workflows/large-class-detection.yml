# IGE-122483 - Eduardo Fragoso
# Code Smell: Large Class (Martin Fowler)
# Deteta classes com demasiados métodos (WMC >= 20) ou atributos (NOA >= 15)
# Baseado em: Object-Oriented Metrics in Practice (Lanza & Marinescu)

name: Detect Large Class Code Smell

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-large-class:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana for JVM
        uses: JetBrains/qodana-action@v2024.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
